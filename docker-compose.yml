services:
  db:
    image: postgres:15-alpine
    container_name: tcc_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: 
      context: ./backend
    container_name: tcc_fastapi
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port ${BACKEND_PORT} --reload
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    depends_on:
      - db
    environment:
      - DATABASE_URL=${DATABASE_URL}

  frontend:
    build: 
      context: ./frontend
    container_name: tcc_react
    restart: always
    command: npm start
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT}:3000"
    environment:
      - WDS_SOCKET_PORT=0
    depends_on:
      - backend

volumes:
  postgres_data: